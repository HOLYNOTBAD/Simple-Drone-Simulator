# configs/multi_pos_ctrl.yaml

# --- timing / rates ---
rates:
  physics_hz: 200.0
  control_hz: 100.0
  camera_hz: 30.0
  visualization_hz: 5.0

visualization:
  enable: true
  realtime: false
  enable_fov: false
  trail_len: 40000
  auto_axis: false
  ned_axes: true
  uav_visual_scale: 10.0
  target_marker_size: 1.0
  map_center: [0.0, 0.0, 1000.0]
  map_size: [1800.0, 1200.0, 600.0]
  colors:
    uav_traj: [158, 22, 157, 140]
    uav_body_left: [22, 5, 139]
    uav_body_right: [98, 0, 170]
    uav_arrow: [204, 74, 116]
    target_traj: [252, 180, 49]
    target_dot: [235, 120, 82]
  enable_realtime_animation: false
  enable_offline_animation: true
  save_cache: false

termination:
  t_final: 60.0

# --- default UAV initial state (applied to each UAV before per-ID trajectory updates) ---
uav0:
  t: 0.0
  p_e: [0.0, 0.0, 0.0]
  v_e: [0.0, 0.0, 0.0]
  q_eb: [1.0, 0.0, 0.0, 0.0]
  w_b: [0.0, 0.0, 0.0]

# --- Rigid body dynamics ---
rigid_body:
  params_yaml: "configs/hummingbird.yaml"

camera:
  fx: 320.0
  fy: 320.0
  fov_x_deg: null
  fov_y_deg: null
  cx: 320.0
  cy: 240.0
  width: 640
  height: 480
  use_default_frd_to_camera: true
  mount_pitch_deg: 0.0
  R_cb: null
  t_cb_b: [0.0, 0.0, 0.0]
  noise_std_px: 0.0
  noise_std_range_scale_px: 0.0
  detection_prob: 1.0
  detection_range_decay_m: 0.0
  delay_s: 0.0

# --- default position-control setpoint options ---
position_setpoint:
  yaw_sp: 0.0

# --- Basic control gains for multi-UAV position control ---
position_controller:
  kp: [0.8, 0.8, 0.8]
  v_max: 20.0

velocity_controller:
  kp: [1.0, 1.0, 1.2]

acceleration_controller:
  mass: 0.5
  g: 9.81

attitude_controller:
  k_r: [4.0, 4.0, 2.0]
  omega_max: 6.0
