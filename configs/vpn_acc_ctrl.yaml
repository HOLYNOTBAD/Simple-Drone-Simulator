# configs/vpn_acc_ctrl.yaml

rates:
  physics_hz: 1000.0
  control_hz: 200.0
  camera_hz: 30.0
  visualization_hz: 24.0

visualization:
  enable: true
  realtime: true
  enable_fov: true
  trail_len: 400
  auto_axis: false
  ned_axes: true
  uav_visual_scale: 3.0
  target_marker_size: 5.0
  fov_target_diameter_m: 1.5
  map_center: [0.0, 0.0, -20.0]
  map_size: [260.0, 160.0, 120.0]
  colors:
    uav_traj: [158, 22, 157, 140]
    uav_body_left: [22, 5, 139]
    uav_body_right: [98, 0, 170]
    uav_arrow: [204, 74, 116]
    target_traj: [252, 180, 49]
    target_dot: [235, 120, 82]
    fov_target: [181, 35, 4]
    fov_status_no_target: [181, 35, 4]
    fov_status_has_target: [0, 128, 0]
  enable_realtime_animation: false
  enable_offline_animation: true
  save_cache: false

monitor:
  enable: false
  realtime: true
  max_points: null
  step_stride: 10
  title: "VPN Acceleration Controller Monitor"
  x_min: 0.0

termination:
  t_final: 25.0
  hit_radius: 3.0

uav0:
  t: 0.0
  p_e: [-120.0, 0.0, 0.0]
  v_e: [10.0, 0.0, 0.0]
  q_eb: [1.0, 0.0, 0.0, 0.0]
  w_b: [0.0, 0.0, 0.0]

tgt0:
  t: 0.0
  p_e: [-80.0, 20.0, -10.0]
  v_e: [4.0, -1.0, -2.0]

target:
  accel_e: null
  diameter_m: 1.5

rigid_body:
  params_yaml: "configs/hummingbird.yaml"

camera:
  fx: 320.0
  fy: 320.0
  cx: 320.0
  cy: 240.0
  width: 640
  height: 480
  mount_pitch_deg: 0.0

controller:
  mass: 0.5
  g: 9.81
  fx: 320.0
  fy: 320.0
  cx: 320.0
  cy: 240.0
  bbox_width_ref_px: 120.0
  bbox_filter_memory: 0.7
  fallback_scale: 0.45
  s_min: 0.25
  s_max: 0.7
  k1: 1.0
  v_d0: 20.0
  alpha: 0.6
  k2: 0.6
  nav_gain: 4.0
  tau: 0.15
  k3: 0.6
  sigma_lo: 0.3
  sigma_hi: 0.5
  accel_max: 12.0
  yaw_rate_far_gain: 1.2
  yaw_rate_near_gain: 0.6
  yaw_d: 1.57079632679
  omega_max: 6.0
  thrust_min: 0.0
  thrust_max: 20.0

logging:
  enable: false
  run_dir: "runs"
  filename: null
  seed: 0
