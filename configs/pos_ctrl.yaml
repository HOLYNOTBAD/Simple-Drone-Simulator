# configs/pos_ctrl.yaml

# --- timing / rates ---
rates:
  physics_hz: 200.0
  control_hz: 100.0
  camera_hz: 30.0
  visualization_hz: 24.0

visualization:
  enable: true
  realtime: false
  enable_fov: false
  trail_len: 200
  auto_axis: false
  ned_axes: true
  uav_visual_scale: 2.0
  target_marker_size: 6.0
  fov_target_marker_size: 7.0
  map_center: [0.0, 0.0, 0.0]
  map_size: [120.0, 80.0, 60.0]
  colors:
    uav_traj: [158, 22, 157, 140]
    uav_body_left: [22, 5, 139]
    uav_body_right: [98, 0, 170]
    uav_arrow: [204, 74, 116]
    target_traj: [252, 180, 49]
    target_dot: [235, 120, 82]


termination:
  t_final: 1000.0
  hit_radius: 0.05

# --- UAV initial state (NED / FRD) ---
uav0:
  t: 0.0
  p_e: [0.0, 0.0, 0.0]
  v_e: [0.0, 0.0, 0.0]
  q_eb: [1.0, 0.0, 0.0, 0.0]
  w_b: [0.0, 0.0, 0.0]

# --- Rigid body dynamics ---
rigid_body:
  params_yaml: "configs/hummingbird.yaml"

camera:
  fx: 320.0
  fy: 320.0
  cx: 320.0
  cy: 240.0
  width: 640
  height: 480
  mount_pitch_deg: 0.0

# --- Position control test setpoint ---
position_setpoint:
  p_sp_e: [0.0, 0.0, 0.0]
  yaw_sp: 0.0

# --- Basic control gains for position-control test ---
position_controller:
  kp: [0.8, 0.8, 0.8]
  v_max: 20.0

velocity_controller:
  kp: [1.0, 1.0, 1.2]

attitude_controller:
  k_r: [4.0, 4.0, 2.0]
  omega_max: 6.0

